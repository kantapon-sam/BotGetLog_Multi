name: Analytics Ingest

on:
  repository_dispatch:
    types:
      - app_launch_batch

permissions:
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Validate analytics issue number
        env:
          ANALYTICS_ISSUE_NUMBER: ${{ vars.BOTGETLOG_ANALYTICS_ISSUE_NUMBER }}
        run: |
          if [ -z "$ANALYTICS_ISSUE_NUMBER" ]; then
            echo "Set repository variable BOTGETLOG_ANALYTICS_ISSUE_NUMBER before using analytics."
            exit 1
          fi

      - name: Append batch to analytics issue
        uses: actions/github-script@v7
        env:
          ANALYTICS_ISSUE_NUMBER: ${{ vars.BOTGETLOG_ANALYTICS_ISSUE_NUMBER }}
        with:
          script: |
            const issueNumber = Number(process.env.ANALYTICS_ISSUE_NUMBER || "0");
            const payload = context.payload.client_payload || {};
            const body = [
              "<!-- botgetlog-analytics -->",
              `<!-- batch-created-at: ${payload.batch_created_at || ""} -->`,
              "```json",
              JSON.stringify(payload),
              "```"
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
